name: Deploy Producao

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: appdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Usar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependencias
        run: npm install

      - name: Build
        run: npm run build

      - name: Aguardar MySQL iniciar
        run: |
          for i in {1..10}; do
            nc -z localhost 3306 && echo "MySQL pronto!" && exit 0
            echo "Esperando MySQL..."
            sleep 3
          done
          exit 1

      - name: Deploy PRODUCAO
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_PROD }}
