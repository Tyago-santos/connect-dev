<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Conect Dev</title>
    <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1"/>
    <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body>
    <header>
        <div class="container">
            <a href=""><img src="assets/images/conectdev_logo.svg" /></a>
        </div>
    </header>
    <section class="container main">
        <form method="POST">
            <input placeholder="Digite seu e-mail" class="input" type="email" name="email" />

            <input placeholder="Digite sua senha" class="input" type="password" name="password" />

            <input class="button" type="submit" value="Acessar o sistema" />

            <a href="">Ainda não tem conta? Cadastre-se</a>
        </form>
    </section>
    <footer class="site-footer">
      <div class="container">
        <div class="footer-brand">
          <img src="assets/images/conectdev_logo.svg" alt="Conect Dev" />
          <span>Conect Dev</span>
        </div>
        <div class="footer-copy">Todos os direitos garantidos.</div>
      </div>
    </footer>

</body>
</html>
